<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>区域表单</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="layout">
        <div class="sidebar">
            <div class="logo">货拉拉管理系统</div>
            <ul>
                <li><a th:href="@{/}">控制台</a></li>
                <li><a th:href="@{/driver}">司机管理</a></li>
                <li><a th:href="@{/driverLevel}">等级体系</a></li>
                <li><a th:href="@{/vehicle}">车辆管理</a></li>
                <li><a th:href="@{/freight}">运价配置</a></li>
                <li><a th:href="@{/order}">订单管理</a></li>
                <li><a th:href="@{/order/stats}">里程统计</a></li>
                <li><a th:href="@{/region}" class="active">区域定价</a></li>
                <li><a th:href="@{/cancelRefundRule}">退费规则</a></li>
                <li><a th:href="@{/billingRule}">计费规则</a></li>
                <li><a th:href="@{/salary}">薪资管理</a></li>
                <li><a th:href="@{/report/monthly}">月度报表</a></li>
            </ul>
        </div>
        <div class="main">
            <div class="header">
                <div>
                    <span style="font-size: 18px; font-weight: 500;">区域表单</span>
                </div>
                <div class="user-info">
                    <span>欢迎，管理员</span>
                    <a th:href="@{/logout}" class="btn btn-sm btn-danger">退出</a>
                </div>
            </div>
            <div class="content">
                <div class="card">
                    <h3 th:text="${region.id == null} ? '新增区域' : '编辑区域'">新增区域</h3>
                    <form th:action="@{/region/save}" method="post" th:object="${region}">
                        <input type="hidden" th:field="*{id}">
                        <div class="form-row">
                            <div class="form-group">
                                <label>区域编码 *</label>
                                <input type="text" th:field="*{regionCode}" required placeholder="请输入区域编码">
                            </div>
                            <div class="form-group">
                                <label>区域名称 *</label>
                                <input type="text" th:field="*{regionName}" required placeholder="请输入区域名称">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>上级编码</label>
                                <select th:field="*{parentCode}">
                                    <option value="">请选择上级区域</option>
                                    <option th:each="pr : ${parentRegions}" th:value="${pr.regionCode}" th:text="${pr.regionName}"></option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>层级</label>
                                <input type="number" th:field="*{level}" placeholder="请输入层级">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>状态</label>
                            <select th:field="*{status}">
                                <option value="1">启用</option>
                                <option value="0">禁用</option>
                            </select>
                        </div>
                        <div class="actions">
                            <button type="submit" class="btn btn-primary">保存</button>
                            <a th:href="@{/region}" class="btn btn-warning">取消</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
