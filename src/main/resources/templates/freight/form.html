<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运价表单</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="layout">
        <div class="sidebar">
            <div class="logo">货拉拉管理系统</div>
            <ul>
                <li><a th:href="@{/}">控制台</a></li>
                <li><a th:href="@{/driver}">司机管理</a></li>
                <li><a th:href="@{/vehicle}">车辆管理</a></li>
                <li><a th:href="@{/freight}" class="active">运价配置</a></li>
                <li><a th:href="@{/order}">订单管理</a></li>
                <li><a th:href="@{/salary}">薪资管理</a></li>
            </ul>
        </div>
        <div class="main">
            <div class="header">
                <div>
                    <span style="font-size: 18px; font-weight: 500;">运价表单</span>
                </div>
                <div class="user-info">
                    <span>欢迎，管理员</span>
                    <a th:href="@{/logout}" class="btn btn-sm btn-danger">退出</a>
                </div>
            </div>
            <div class="content">
                <div class="card">
                    <h3 th:text="${config.id == null} ? '新增运价' : '编辑运价'">新增运价</h3>
                    <form th:action="@{/freight/save}" method="post" th:object="${config}">
                        <input type="hidden" th:field="*{id}">
                        <div class="form-row">
                            <div class="form-group">
                                <label>车型 *</label>
                                <select th:field="*{vehicleType}" required>
                                    <option value="">请选择</option>
                                    <option value="小面包车">小面包车</option>
                                    <option value="中面包车">中面包车</option>
                                    <option value="小货车">小货车</option>
                                    <option value="中货车">中货车</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>起步价 *</label>
                                <input type="number" step="0.01" th:field="*{startPrice}" required placeholder="请输入起步价">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>起步里程(公里) *</label>
                                <input type="number" step="0.01" th:field="*{startDistance}" required placeholder="请输入起步里程">
                            </div>
                            <div class="form-group">
                                <label>里程单价(元/公里) *</label>
                                <input type="number" step="0.01" th:field="*{pricePerKm}" required placeholder="请输入里程单价">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>等候费(元/分钟) *</label>
                                <input type="number" step="0.01" th:field="*{waitPricePerMin}" required placeholder="请输入等候费">
                            </div>
                            <div class="form-group">
                                <label>搬运费</label>
                                <input type="number" step="0.01" th:field="*{carryPrice}" placeholder="请输入搬运费">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>说明</label>
                            <textarea th:field="*{description}" rows="3" placeholder="请输入说明"></textarea>
                        </div>
                        <div class="form-group">
                            <label>状态</label>
                            <select th:field="*{status}">
                                <option value="1">启用</option>
                                <option value="0">禁用</option>
                            </select>
                        </div>
                        <div class="actions">
                            <button type="submit" class="btn btn-primary">保存</button>
                            <a th:href="@{/freight}" class="btn btn-warning">返回</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
