<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运价配置</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="layout">
        <div class="sidebar">
            <div class="logo">货拉拉管理系统</div>
            <ul>
                <li><a th:href="@{/}">控制台</a></li>
                <li><a th:href="@{/driver}">司机管理</a></li>
                <li><a th:href="@{/driverLevel}">等级体系</a></li>
                <li><a th:href="@{/vehicle}">车辆管理</a></li>
                <li><a th:href="@{/freight}" class="active">运价配置</a></li>
                <li><a th:href="@{/region}">区域定价</a></li>
                <li><a th:href="@{/cancelRefundRule}">退费规则</a></li>
                <li><a th:href="@{/billingRule}">计费规则</a></li>
                <li><a th:href="@{/order}">订单管理</a></li>
                <li><a th:href="@{/order/stats}">里程统计</a></li>
                <li><a th:href="@{/salary}">薪资管理</a></li>
                <li><a th:href="@{/report/monthly}">月度报表</a></li>
            </ul>
        </div>
        <div class="main">
            <div class="header">
                <div>
                    <span style="font-size: 18px; font-weight: 500;">运价配置</span>
                </div>
                <div class="user-info">
                    <span>欢迎，管理员</span>
                    <a th:href="@{/logout}" class="btn btn-sm btn-danger">退出</a>
                </div>
            </div>
            <div class="content">
                <div class="card">
                    <div class="toolbar">
                        <h3 style="margin: 0;">运价列表</h3>
                        <a th:href="@{/freight/add}" class="btn btn-primary">+ 新增配置</a>
                    </div>
                    <table class="table">
                        <thead>
                            <tr>
                                <th>车型</th>
                                <th>区域</th>
                                <th>起步价</th>
                                <th>起步里程</th>
                                <th>里程单价</th>
                                <th>高峰时段</th>
                                <th>加价率</th>
                                <th>夜间时段</th>
                                <th>加价率</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="config : ${configs}">
                                <td th:text="${config.vehicleType}"></td>
                                <td th:text="${config.regionCode != null ? config.regionCode : '默认'}"></td>
                                <td th:text="'¥' + ${config.startPrice}"></td>
                                <td th:text="${config.startDistance} + '公里'"></td>
                                <td th:text="'¥' + ${config.pricePerKm} + '/公里'"></td>
                                <td>
                                    <span th:if="${config.peakTimeStart != null and config.peakTimeEnd != null}"
                                          th:text="${config.peakTimeStart} + '-' + ${config.peakTimeEnd}"></span>
                                    <span th:if="${config.peakTimeStart == null or config.peakTimeEnd == null}" style="color: #999;">未配置</span>
                                </td>
                                <td>
                                    <span th:if="${config.peakSurchargeRate != null}"
                                          th:text="${config.peakSurchargeRate * 100} + '%'"></span>
                                    <span th:if="${config.peakSurchargeRate == null}" style="color: #999;">-</span>
                                </td>
                                <td>
                                    <span th:if="${config.nightTimeStart != null and config.nightTimeEnd != null}"
                                          th:text="${config.nightTimeStart} + '-' + ${config.nightTimeEnd}"></span>
                                    <span th:if="${config.nightTimeStart == null or config.nightTimeEnd == null}" style="color: #999;">未配置</span>
                                </td>
                                <td>
                                    <span th:if="${config.nightSurchargeRate != null}"
                                          th:text="${config.nightSurchargeRate * 100} + '%'"></span>
                                    <span th:if="${config.nightSurchargeRate == null}" style="color: #999;">-</span>
                                </td>
                                <td>
                                    <span th:class="${config.status == 1 ? 'status-badge status-4' : 'status-badge status-9'}"
                                          th:text="${config.status == 1 ? '启用' : '禁用'}"></span>
                                </td>
                                <td>
                                    <a th:href="@{/freight/edit/{id}(id=${config.id})}" class="btn btn-sm btn-primary">编辑</a>
                                    <a th:href="@{/freight/delete/{id}(id=${config.id})}" class="btn btn-sm btn-danger" onclick="return confirm('确定删除吗？')">删除</a>
                                </td>
                            </tr>
                            <tr th:if="${configs.isEmpty()}">
                                <td colspan="11" style="text-align: center; color: #999;">暂无数据</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
