<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增订单</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="layout">
        <div class="sidebar">
            <div class="logo">货拉拉管理系统</div>
            <ul>
                <li><a th:href="@{/}">控制台</a></li>
                <li><a th:href="@{/driver}">司机管理</a></li>
                <li><a th:href="@{/vehicle}">车辆管理</a></li>
                <li><a th:href="@{/freight}">运价配置</a></li>
                <li><a th:href="@{/order}" class="active">订单管理</a></li>
                <li><a th:href="@{/salary}">薪资管理</a></li>
            </ul>
        </div>
        <div class="main">
            <div class="header">
                <div>
                    <span style="font-size: 18px; font-weight: 500;">新增订单</span>
                </div>
                <div class="user-info">
                    <span>欢迎，管理员</span>
                    <a th:href="@{/logout}" class="btn btn-sm btn-danger">退出</a>
                </div>
            </div>
            <div class="content">
                <div class="card">
                    <h3>新增订单</h3>
                    <form th:action="@{/order/save}" method="post" th:object="${order}">
                        <div class="form-row">
                            <div class="form-group">
                                <label>客户姓名 *</label>
                                <input type="text" th:field="*{customerName}" required placeholder="请输入客户姓名">
                            </div>
                            <div class="form-group">
                                <label>客户电话</label>
                                <input type="text" th:field="*{customerPhone}" placeholder="请输入客户电话">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>车型 *</label>
                                <select th:field="*{vehicleType}" required>
                                    <option value="">请选择</option>
                                    <option th:each="fc : ${freightConfigs}" th:value="${fc.vehicleType}" th:text="${fc.vehicleType}"></option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>里程(公里) *</label>
                                <input type="number" step="0.01" th:field="*{distance}" required placeholder="请输入里程">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>起始地址 *</label>
                            <input type="text" th:field="*{startAddress}" required placeholder="请输入起始地址">
                        </div>
                        <div class="form-group">
                            <label>目的地址 *</label>
                            <input type="text" th:field="*{endAddress}" required placeholder="请输入目的地址">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>搬运费</label>
                                <input type="number" step="0.01" th:field="*{carryFee}" placeholder="请输入搬运费">
                            </div>
                            <div class="form-group">
                                <label>备注</label>
                                <input type="text" th:field="*{remark}" placeholder="请输入备注">
                            </div>
                        </div>
                        <div class="actions">
                            <button type="submit" class="btn btn-primary">提交订单</button>
                            <a th:href="@{/order}" class="btn btn-warning">返回</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
