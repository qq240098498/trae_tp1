<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>车辆表单</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="layout">
        <div class="sidebar">
            <div class="logo">货拉拉管理系统</div>
            <ul>
                <li><a th:href="@{/}">控制台</a></li>
                <li><a th:href="@{/driver}">司机管理</a></li>
                <li><a th:href="@{/vehicle}" class="active">车辆管理</a></li>
                <li><a th:href="@{/freight}">运价配置</a></li>
                <li><a th:href="@{/order}">订单管理</a></li>
                <li><a th:href="@{/order/stats}">里程统计</a></li>
                <li><a th:href="@{/salary}">薪资管理</a></li>
            </ul>
        </div>
        <div class="main">
            <div class="header">
                <div>
                    <span style="font-size: 18px; font-weight: 500;">车辆表单</span>
                </div>
                <div class="user-info">
                    <span>欢迎，管理员</span>
                    <a th:href="@{/logout}" class="btn btn-sm btn-danger">退出</a>
                </div>
            </div>
            <div class="content">
                <div class="card">
                    <h3 th:text="${vehicle.id == null} ? '新增车辆' : '编辑车辆'">新增车辆</h3>
                    <form th:action="@{/vehicle/save}" method="post" th:object="${vehicle}">
                        <input type="hidden" th:field="*{id}">
                        <div class="form-row">
                            <div class="form-group">
                                <label>车牌号 *</label>
                                <input type="text" th:field="*{plateNo}" required placeholder="请输入车牌号">
                            </div>
                            <div class="form-group">
                                <label>车型</label>
                                <select th:field="*{vehicleType}">
                                    <option value="">请选择</option>
                                    <option value="小面包车">小面包车</option>
                                    <option value="中面包车">中面包车</option>
                                    <option value="小货车">小货车</option>
                                    <option value="中货车">中货车</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>品牌</label>
                                <input type="text" th:field="*{brand}" placeholder="请输入品牌">
                            </div>
                            <div class="form-group">
                                <label>型号</label>
                                <input type="text" th:field="*{model}" placeholder="请输入型号">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>颜色</label>
                                <input type="text" th:field="*{color}" placeholder="请输入颜色">
                            </div>
                            <div class="form-group">
                                <label>关联司机</label>
                                <select th:field="*{driver.id}">
                                    <option value="">请选择司机</option>
                                    <option th:each="d : ${drivers}" th:value="${d.id}" th:text="${d.name}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>载重(吨)</label>
                                <input type="number" step="0.01" th:field="*{loadCapacity}" placeholder="请输入载重">
                            </div>
                            <div class="form-group">
                                <label>体积(方)</label>
                                <input type="number" step="0.01" th:field="*{volume}" placeholder="请输入体积">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>注册日期</label>
                                <input type="date" th:field="*{registerDate}">
                            </div>
                            <div class="form-group">
                                <label>年检到期</label>
                                <input type="date" th:field="*{inspectExpireDate}">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>保险单号</label>
                                <input type="text" th:field="*{insuranceNo}" placeholder="请输入保险单号">
                            </div>
                            <div class="form-group">
                                <label>保险到期</label>
                                <input type="date" th:field="*{insuranceExpireDate}">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>状态</label>
                            <select th:field="*{status}">
                                <option value="1">正常</option>
                                <option value="0">停用</option>
                            </select>
                        </div>
                        <div class="actions">
                            <button type="submit" class="btn btn-primary">保存</button>
                            <a th:href="@{/vehicle}" class="btn btn-warning">返回</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
