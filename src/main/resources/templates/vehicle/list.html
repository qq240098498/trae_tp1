<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>车辆管理</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="layout">
        <div class="sidebar">
            <div class="logo">货拉拉管理系统</div>
            <ul>
                <li><a th:href="@{/}">控制台</a></li>
                <li><a th:href="@{/driver}">司机管理</a></li>
                <li><a th:href="@{/vehicle}" class="active">车辆管理</a></li>
                <li><a th:href="@{/freight}">运价配置</a></li>
                <li><a th:href="@{/order}">订单管理</a></li>
                <li><a th:href="@{/order/stats}">里程统计</a></li>
                <li><a th:href="@{/salary}">薪资管理</a></li>
            </ul>
        </div>
        <div class="main">
            <div class="header">
                <div>
                    <span style="font-size: 18px; font-weight: 500;">车辆管理</span>
                </div>
                <div class="user-info">
                    <span>欢迎，管理员</span>
                    <a th:href="@{/logout}" class="btn btn-sm btn-danger">退出</a>
                </div>
            </div>
            <div class="content">
                <div class="card">
                    <div class="toolbar">
                        <h3 style="margin: 0;">车辆列表</h3>
                        <a th:href="@{/vehicle/add}" class="btn btn-primary">+ 新增车辆</a>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>车牌号</th>
                                <th>车型</th>
                                <th>品牌</th>
                                <th>载重(吨)</th>
                                <th>体积(方)</th>
                                <th>关联司机</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="vehicle : ${vehicles}">
                                <td th:text="${vehicle.plateNo}"></td>
                                <td th:text="${vehicle.vehicleType}"></td>
                                <td th:text="${vehicle.brand}"></td>
                                <td th:text="${vehicle.loadCapacity}"></td>
                                <td th:text="${vehicle.volume}"></td>
                                <td th:text="${vehicle.driver != null ? vehicle.driver.name : '未分配'}"></td>
                                <td>
                                    <span th:class="${vehicle.status == 1 ? 'status-badge status-4' : 'status-badge status-9'}"
                                          th:text="${vehicle.status == 1 ? '正常' : '停用'}"></span>
                                </td>
                                <td>
                                    <a th:href="@{/vehicle/edit/{id}(id=${vehicle.id})}" class="btn btn-sm btn-primary">编辑</a>
                                    <a th:href="@{/vehicle/delete/{id}(id=${vehicle.id})}" class="btn btn-sm btn-danger" onclick="return confirm('确定删除吗？')">删除</a>
                                </td>
                            </tr>
                            <tr th:if="${vehicles.isEmpty()}">
                                <td colspan="8" style="text-align: center; color: #999;">暂无数据</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
